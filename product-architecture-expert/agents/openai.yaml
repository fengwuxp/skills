interface:
  display_name: "产品架构专家"
  short_description: "复杂业务 PRD、产品与业务架构、原型反推及支付资金/外卡收单设计"
  brand_color: "#2563EB"
  default_prompt: "Use $product-architecture-expert 基于当前需求、资料、机会清单、业务架构规划、原型、页面截图或 AI Native 产品上下文，先以能力提供者视角提炼共性并保护有证据的特殊性，再输出可评审的产品方案/PRD/业务架构规划；业务架构规划按需补能力地图；正式正文按背景、目标、定性、概要、详细设计、流程、规则、接口抽象、风险、待确认项和验收摘要展开，详细执行控制进入执行计划；需要图形化交付时默认输出 SVG。"
policy:
  allow_implicit_invocation: true
