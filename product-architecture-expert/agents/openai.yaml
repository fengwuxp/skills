interface:
  display_name: "产品架构专家"
  short_description: "AI Native上下文、Backlog决策、PRD/产品架构、原型反推、能力流程状态图、支付资金与外卡收单专项"
  brand_color: "#2563EB"
  default_prompt: "Use $产品架构专家 帮我基于这个需求、机会清单、Backlog、AI Native 产品上下文、原型、页面截图或交互稿生成可评审的 PRD/产品架构方案，包含角色、主体、范围、优先级、User Story、AC、能力地图、业务流程、状态机、规则矩阵、数据指标、运营后台、风险、待确认项和验收标准；需要图形化交付时默认输出 SVG，Mermaid/Markdown 草图、PNG/PDF/截图等其他格式需明确提出。"
policy:
  allow_implicit_invocation: true
