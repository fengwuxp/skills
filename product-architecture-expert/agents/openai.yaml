  short_description: "PRD/产品架构、AI Native 产品上下文、原型反推、产品洞察/机会雷达、Backlog决策、User Story/AC、支付资金专项"
  brand_color: "#2563EB"
  default_prompt: "Use $产品架构专家 基于当前需求、资料、机会清单、原型、页面截图或 AI Native 产品上下文，输出可评审的产品方案/PRD：说明目标、主体、范围、对象规则、流程、验收种子、风险和待确认项；需要图形化交付时默认输出 SVG。"
policy:
  allow_implicit_invocation: true
