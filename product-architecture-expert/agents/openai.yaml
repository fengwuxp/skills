interface:
  display_name: "产品架构专家"
  short_description: "复杂业务 PRD、产品与业务架构、原型反推及支付资金/外卡收单设计"
  brand_color: "#2563EB"
  default_prompt: "Use $产品架构专家 基于当前需求、资料、机会清单、业务架构规划、原型、页面截图或 AI Native 产品上下文，输出可评审的产品方案/PRD/业务架构规划：说明目标、主体、范围、能力地图、对象规则、流程、验收种子、风险和待确认项；需要图形化交付时默认输出 SVG。"
policy:
  allow_implicit_invocation: true
